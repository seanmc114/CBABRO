<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TURBO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral: #FF6B6B;
      --gold: #FFD93D;
      --teal: #6BCB77;
      --blue: #4D96FF;
      --dark: #1a1a2e;
      --ghost: #c8b8e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      overflow-x: hidden;
    }

    /* GHOST */
    #ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 5rem;
      opacity: 0;
      transition: opacity 1.5s ease;
      filter: drop-shadow(0 0 20px var(--ghost));
      user-select: none;
      animation: ghostFloat 4s ease-in-out infinite;
    }
    #ghost.visible { opacity: 0.7; }
    #ghost-msg {
      position: fixed;
      z-index: 9998;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      color: var(--ghost);
      opacity: 0;
      transition: opacity 1.5s ease;
      max-width: 160px;
      text-align: center;
      font-style: italic;
      text-shadow: 0 0 10px var(--ghost);
    }
    #ghost-msg.visible { opacity: 0.85; }
    @keyframes ghostFloat {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-18px) rotate(3deg); }
    }

    .container {
      width: 100%;
      max-width: 640px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px 28px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 5.5rem;
      color: var(--coral);
      text-align: center;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 6px;
      text-shadow: 4px 4px 0 rgba(255,107,107,0.3);
      transform: skewX(-6deg);
      display: inline-block;
      width: 100%;
    }

    .tagline {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-bottom: 28px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* LANGUAGE PICKER */
    #lang-picker {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lang-btn:hover { border-color: var(--gold); color: var(--gold); }
    .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark); }

    /* CATEGORY PICKER */
    #cat-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .cat-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.55);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn:hover { border-color: var(--teal); color: var(--teal); }
    .cat-btn.active { background: var(--teal); border-color: var(--teal); color: var(--dark); }

    /* LEVELS */
    #level-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .level-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      padding: 16px 20px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: left;
    }
    .level-btn:not(:disabled):hover { transform: translateX(4px) scale(1.01); }
    .level-btn.unlocked { background: linear-gradient(135deg, var(--teal), #4CAF50); color: white; }
    .level-btn.locked { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.25); cursor: not-allowed; border: 2px dashed rgba(255,255,255,0.1); }
    .level-btn .best { font-size: 0.75rem; opacity: 0.7; }

    /* GAME */
    #game { display: none; }
    #timer-bar-wrap {
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      height: 10px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    #timer-bar { height: 100%; background: var(--blue); border-radius: 50px; transition: background 0.3s; width: 0%; }
    #timer-display {
      text-align: right;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 20px;
    }

    .q-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }
    .q-prompt {
      font-size: 1.1rem;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .q-card input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .q-card input:focus { border-color: var(--blue); }
    .q-card input.correct { border-color: var(--teal); background: rgba(107,203,119,0.12); }
    .q-card input.wrong { border-color: var(--coral); background: rgba(255,107,107,0.1); }
    .q-feedback { font-size: 0.85rem; margin-top: 6px; min-height: 20px; }
    .q-feedback.correct { color: var(--teal); }
    .q-feedback.wrong { color: var(--coral); }

    .btn-primary {
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 900;
      padding: 15px 30px;
      background: var(--coral);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-top: 10px;
    }
    .btn-primary:hover { background: #ff5252; transform: scale(1.02); }

    .btn-secondary {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 12px 24px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
      width: 100%;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); color: white; }

    /* RESULTS */
    #results-panel { display: none; }
    .score-big {
      text-align: center;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 4rem;
      color: var(--gold);
      margin: 10px 0;
    }
    .score-label { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 20px; }

    .star-row { text-align: center; font-size: 2rem; margin-bottom: 16px; }

    .unlock-banner {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      margin: 16px 0;
      animation: pulse 2s infinite;
    }
    .unlock-banner h3 { color: white; font-size: 1.1rem; margin-bottom: 6px; }
    .unlock-banner p { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(124,58,237,0); }
    }

    .brother-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .brother-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

    .review-list { margin: 16px 0; }
    .review-item {
      background: rgba(255,107,107,0.08);
      border-left: 3px solid var(--coral);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .review-item .prompt { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-bottom: 3px; }
    .review-item .correct-ans { color: var(--teal); font-weight: 700; }
    .review-item .user-ans { color: var(--coral); }

    /* PROGRESS BAR */
    .progress-section { margin-bottom: 24px; }
    .progress-label { color: rgba(255,255,255,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-track { background: rgba(255,255,255,0.08); border-radius: 50px; height: 8px; }
    .progress-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--blue), var(--teal)); transition: width 0.5s ease; }

    /* SECTION LABEL */
    .section-label {
      color: rgba(255,255,255,0.3);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 20px 0; }

    /* VOICE */
    .voice-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      padding: 4px;
    }
    .voice-btn:hover { opacity: 1; }

    /* Celebration */
    .perfect-banner {
      background: linear-gradient(135deg, var(--gold), #ff9800);
      color: var(--dark);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 16px;
      animation: celebrateBounce 0.5s ease;
    }
    @keyframes celebrateBounce {
      0% { transform: scale(0.8); } 60% { transform: scale(1.05); } 100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<!-- GHOST -->
<div id="ghost">👻</div>
<div id="ghost-msg"></div>

<div class="container">
  <h1>TURBO</h1>
  <p class="tagline">Level up your language · Earn The Brother</p>

  <!-- LANGUAGE -->
  <div id="lang-picker">
    <button class="lang-btn active" data-lang="es" onclick="selectLang('es',this)">🇪🇸 Spanish</button>
    <button class="lang-btn" data-lang="fr" onclick="selectLang('fr',this)">🇫🇷 French</button>
    <button class="lang-btn" data-lang="de" onclick="selectLang('de',this)">🇩🇪 German</button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section" id="progress-section">
    <div class="progress-label">
      <span>Progress to The Brother</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- CATEGORY -->
  <div class="section-label">Category</div>
  <div id="cat-picker">
    <button class="cat-btn active" data-cat="identity" onclick="selectCat('identity',this)">👤 Who I Am</button>
    <button class="cat-btn" data-cat="family" onclick="selectCat('family',this)">👨‍👩‍👧 Family</button>
    <button class="cat-btn" data-cat="likes" onclick="selectCat('likes',this)">❤️ Likes & Dislikes</button>
    <button class="cat-btn" data-cat="school" onclick="selectCat('school',this)">🎒 School</button>
    <button class="cat-btn" data-cat="hobbies" onclick="selectCat('hobbies',this)">⚽ Hobbies</button>
    <button class="cat-btn" data-cat="opinions" onclick="selectCat('opinions',this)">💭 Opinions</button>
  </div>

  <hr class="divider">

  <!-- LEVELS -->
  <div id="menu-view">
    <div class="section-label">Choose a level</div>
    <div id="level-list"></div>
  </div>

  <!-- GAME -->
  <div id="game">
    <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    <div id="timer-display">Time: 0s</div>
    <div id="questions"></div>
    <button class="btn-primary" id="submit-btn" onclick="submitGame()">Check Answers ✓</button>
    <button class="btn-secondary" onclick="backToMenu()">← Back to Levels</button>
  </div>

  <!-- RESULTS -->
  <div id="results-panel">
    <div id="perfect-area"></div>
    <div class="score-big" id="score-display"></div>
    <div class="score-label" id="score-label"></div>
    <div class="star-row" id="star-row"></div>
    <div id="unlock-area"></div>
    <div class="review-list" id="review-list"></div>
    <button class="btn-primary" onclick="retryGame()">Try Again ↺</button>
    <button class="btn-secondary" onclick="backToMenu()">← Back to Levels</button>
  </div>
</div>

const LEVELS = [
  { n: 1, label: "Level 1 — Starter", count: 5, target: 90 },
  { n: 2, label: "Level 2 — Building", count: 7, target: 120 },
  { n: 3, label: "Level 3 — Getting There", count: 8, target: 150 },
  { n: 4, label: "Level 4 — Sharp", count: 10, target: 180 },
  { n: 5, label: "Level 5 — Turbo", count: 10, target: 240 },
];

const BROTHER_UNLOCK_SCORE = 30; // total stars needed

const GHOST_MESSAGES = [
  "Still there...?",
  "Tick tock...",
  "I'm watching...",
  "Don't give up now...",
  "Nearly there...",
  "Come on...",
];

// ============================================================
// STATE
// ============================================================
let currentLang = 'es';
let currentCat = 'identity';
let currentLevel = null;
let currentQuestions = [];
let startTime = null;
let timerInterval = null;
let timerBarInterval = null;
let idleTimer = null;
let ghostTimeout = null;

function getLangKey(lang, cat) { return `turbo_${lang}_${cat}`; }
function getUnlocked(lang) { return parseInt(localStorage.getItem(`turbo_unlocked_${lang}`) || '1'); }
function setUnlocked(lang, level) { localStorage.setItem(`turbo_unlocked_${lang}`, Math.max(getUnlocked(lang), level)); }
function getBest(lang, cat, level) { return localStorage.getItem(`turbo_best_${lang}_${cat}_${level}`); }
function setBest(lang, cat, level, score) {
  const prev = getBest(lang, cat, level);
  if (!prev || score > parseInt(prev)) localStorage.setItem(`turbo_best_${lang}_${cat}_${level}`, score);
}
function getTotalStars() {
  let total = 0;
  ['es','fr','de'].forEach(lang => {
    ['identity','family','likes','school','hobbies','opinions'].forEach(cat => {
      LEVELS.forEach(lv => {
        const b = getBest(lang, cat, lv.n);
        if (b) total += parseInt(b);
      });
    });
  });
  return total;
}
function brotherUnlocked() { return getTotalStars() >= BROTHER_UNLOCK_SCORE; }

// ============================================================
// UI
// ============================================================
function selectLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
  updateProgress();
}

function selectCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const list = document.getElementById('level-list');
  const unlocked = getUnlocked(currentLang);
  list.innerHTML = '';
  LEVELS.forEach(lv => {
    const isUnlocked = lv.n <= unlocked;
    const best = getBest(currentLang, currentCat, lv.n);
    const stars = best ? starStr(parseInt(best), 3) : '';
    const btn = document.createElement('button');
    btn.className = 'level-btn ' + (isUnlocked ? 'unlocked' : 'locked');
    btn.disabled = !isUnlocked;
    btn.innerHTML = `<span>${isUnlocked ? '' : '🔒 '}${lv.label}</span><span class="best">${stars || (isUnlocked ? 'Not played' : '')}</span>`;
    if (isUnlocked) btn.onclick = () => startGame(lv.n);
    list.appendChild(btn);
  });

  // Brother button if unlocked
  if (brotherUnlocked()) {
    const bb = document.createElement('button');
    bb.className = 'brother-btn';
    bb.innerHTML = '👻 Enter The Brother';
    bb.onclick = () => window.location.href = 'brother.html';
    list.appendChild(bb);
  }

  showView('menu-view');
  updateProgress();
}

function updateProgress() {
  const stars = getTotalStars();
  const pct = Math.min(100, Math.round((stars / BROTHER_UNLOCK_SCORE) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

function starStr(n, max) {
  return '⭐'.repeat(Math.min(n, max)) + '☆'.repeat(Math.max(0, max - n));
}

function showView(view) {
  document.getElementById('menu-view').style.display = view === 'menu-view' ? '' : 'none';
  document.getElementById('game').style.display = view === 'game' ? '' : 'none';
  document.getElementById('results-panel').style.display = view === 'results' ? '' : 'none';
}

// ============================================================
// GAME
// ============================================================
function startGame(levelN) {
  currentLevel = levelN;
  const lv = LEVELS[levelN - 1];
  const pool = PHRASES[currentLang][currentCat];
  currentQuestions = shuffle([...pool]).slice(0, lv.count);

  const qContainer = document.getElementById('questions');
  qContainer.innerHTML = '';
  currentQuestions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `
      <div class="q-prompt">${q.en}</div>
      <input type="text" id="q${i}" placeholder="Type in ${langName(currentLang)}..." autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="q-feedback" id="f${i}"></div>
    `;
    qContainer.appendChild(card);
  });

  showView('game');
  startTimers(lv.target);
  resetIdleTimer();

  // Focus first input
  setTimeout(() => { const el = document.getElementById('q0'); if(el) el.focus(); }, 100);

  // Listen for any input to reset idle
  document.querySelectorAll('#questions input').forEach(inp => {
    inp.addEventListener('input', resetIdleTimer);
    inp.addEventListener('keydown', (e) => { if(e.key === 'Enter') submitGame(); });
  });
}

function startTimers(target) {
  startTime = Date.now();
  const bar = document.getElementById('timer-bar');
  bar.style.width = '0%';
  bar.style.background = 'var(--blue)';

  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timer-display').textContent = `Time: ${elapsed}s`;
    const pct = Math.min(100, (elapsed / target) * 100);
    bar.style.width = pct + '%';
    if (pct > 80) bar.style.background = 'var(--coral)';
    else if (pct > 50) bar.style.background = 'var(--gold)';
    else bar.style.background = 'var(--blue)';
  }, 500);
}

function stopTimers() {
  clearInterval(timerInterval);
  clearInterval(timerBarInterval);
}

// ============================================================
// GHOST
// ============================================================
function resetIdleTimer() {
  hideGhost();
  clearTimeout(idleTimer);
  idleTimer = setTimeout(showGhost, 25000); // 25s idle
}

function showGhost() {
  const ghost = document.getElementById('ghost');
  const msg = document.getElementById('ghost-msg');
  // Random position on edge
  const side = Math.floor(Math.random() * 4);
  let top, left;
  if (side === 0) { top = '10%'; left = Math.random() * 60 + 10 + '%'; }
  else if (side === 1) { top = Math.random() * 60 + 20 + '%'; left = '5%'; }
  else if (side === 2) { top = '80%'; left = Math.random() * 60 + 10 + '%'; }
  else { top = Math.random() * 60 + 20 + '%'; left = '80%'; }

  ghost.style.top = top;
  ghost.style.left = left;
  msg.style.top = `calc(${top} + 80px)`;
  msg.style.left = left;
  msg.textContent = GHOST_MESSAGES[Math.floor(Math.random() * GHOST_MESSAGES.length)];
  ghost.classList.add('visible');
  msg.classList.add('visible');

  ghostTimeout = setTimeout(hideGhost, 5000);
}

function hideGhost() {
  clearTimeout(ghostTimeout);
  document.getElementById('ghost').classList.remove('visible');
  document.getElementById('ghost-msg').classList.remove('visible');
}

// ============================================================
// SUBMIT
// ============================================================
function submitGame() {
  stopTimers();
  clearTimeout(idleTimer);
  hideGhost();

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const lv = LEVELS[currentLevel - 1];
  let correct = 0;
  const wrong = [];

  currentQuestions.forEach((q, i) => {
    const inp = document.getElementById(`q${i}`);
    const fb = document.getElementById(`f${i}`);
    const userAns = (inp.value || '').trim();
    const correctAns = q.tl;
    // Flexible check: ignore case, ignore ...
    const normalise = s => s.toLowerCase().replace(/\.\.\./g,'').replace(/[éèê]/g,'e').replace(/[àâ]/g,'a').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ûü]/g,'u').replace(/[ç]/g,'c').replace(/[ñ]/g,'n').replace(/[ß]/g,'ss').trim();
    const isCorrect = normalise(userAns) === normalise(correctAns);

    if (isCorrect) {
      correct++;
      inp.classList.add('correct');
      fb.textContent = '✓ Perfect!';
      fb.className = 'q-feedback correct';
    } else {
      inp.classList.add('wrong');
      fb.textContent = `✗ Answer: ${correctAns}`;
      fb.className = 'q-feedback wrong';
      wrong.push({ prompt: q.en, correct: correctAns, user: userAns });
    }
  });

  const total = currentQuestions.length;
  const stars = correct === total ? 3 : correct >= Math.ceil(total * 0.7) ? 2 : correct >= Math.ceil(total * 0.4) ? 1 : 0;
  setBest(currentLang, currentCat, currentLevel, stars);

  // Unlock next level if stars >= 1
  if (stars >= 1 && currentLevel < LEVELS.length) {
    setUnlocked(currentLang, currentLevel + 1);
  }

  showResults(correct, total, stars, elapsed, wrong);
}

function showResults(correct, total, stars, elapsed, wrong) {
  // Show game briefly then switch
  setTimeout(() => {
    showView('results');
    document.getElementById('score-display').textContent = `${correct}/${total}`;
    document.getElementById('score-label').textContent = `in ${elapsed} seconds`;
    document.getElementById('star-row').textContent = starStr(stars, 3);

    const perfectArea = document.getElementById('perfect-area');
    perfectArea.innerHTML = correct === total ? '<div class="perfect-banner">🎉 PERFECT! 🎉</div>' : '';

    // Unlock / Brother
    const unlockArea = document.getElementById('unlock-area');
    unlockArea.innerHTML = '';
    if (brotherUnlocked()) {
      unlockArea.innerHTML = `
        <div class="unlock-banner">
          <h3>👻 The Brother awaits...</h3>
          <p>You've earned enough to meet him. Enter when you're ready.</p>
        </div>
        <button class="brother-btn" onclick="window.location.href='brother.html'">Enter The Brother 👻</button>
      `;
    }

    // Wrong answers review
    const reviewList = document.getElementById('review-list');
    reviewList.innerHTML = wrong.length ? '<div class="section-label" style="margin-top:16px">Review these</div>' : '';
    wrong.forEach(w => {
      const item = document.createElement('div');
      item.className = 'review-item';
      item.innerHTML = `<div class="prompt">${w.prompt}</div><div class="correct-ans">✓ ${w.correct}</div>${w.user ? `<div class="user-ans">✗ ${w.user}</div>` : ''}`;
      reviewList.appendChild(item);
    });

    updateProgress();
  }, 800);
}

function retryGame() { startGame(currentLevel); }
function backToMenu() { stopTimers(); clearTimeout(idleTimer); hideGhost(); showView('menu-view'); renderMenu(); }

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
function langName(lang) { return { es: 'Spanish', fr: 'French', de: 'German' }[lang]; }

// ============================================================
// INIT
// ============================================================
renderMenu();
updateProgress();
</script>
