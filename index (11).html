    .section-label { color:rgba(255,255,255,0.3); font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; }

  {n:1, label:"Level 1 — Starter",       count:5,  unlockTime:120},
  {n:2, label:"Level 2 — Building",      count:7,  unlockTime:150},
  {n:3, label:"Level 3 — Getting There", count:8,  unlockTime:180},
  {n:4, label:"Level 4 — Sharp",         count:10, unlockTime:220},
  {n:5, label:"Level 5 — Turbo",         count:10, unlockTime:260},
];

const BROTHER_UNLOCK_SCORE = 30;
const PENALTY = 20;
const GHOST_MSGS = ["Still there...?","Tick tock...","I'm watching...","Don't give up now...","Come on..."];

let currentLang='es', currentCat='identity', currentLevel=1;
let currentQuestions=[], startTime=null, timerInterval=null, idleTimer=null, ghostTimeout=null;

function getUnlocked(lang){ return parseInt(localStorage.getItem('turbo_unlocked_'+lang)||'1'); }
function setUnlocked(lang,level){ if(level>getUnlocked(lang)) localStorage.setItem('turbo_unlocked_'+lang,level); }
function getStars(lang,cat,level){ return parseInt(localStorage.getItem('turbo_best_'+lang+'_'+cat+'_'+level)||'0'); }
function setStars(lang,cat,level,stars){ if(stars>getStars(lang,cat,level)) localStorage.setItem('turbo_best_'+lang+'_'+cat+'_'+level,stars); }
function getBestTime(lang,cat,level){ return localStorage.getItem('turbo_time_'+lang+'_'+cat+'_'+level); }
function setBestTime(lang,cat,level,t){ const p=getBestTime(lang,cat,level); if(!p||t<parseInt(p)) localStorage.setItem('turbo_time_'+lang+'_'+cat+'_'+level,t); }
function getTotalStars(){ let t=0; ['es','fr','de'].forEach(l=>['identity','family','likes','school','hobbies','opinions'].forEach(c=>{ for(let v=1;v<=5;v++) t+=getStars(l,c,v); })); return t; }
function brotherUnlocked(){ return getTotalStars()>=BROTHER_UNLOCK_SCORE; }

function selectLang(lang,btn){ currentLang=lang; document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); showMenu(); }
function selectCat(cat,btn){ currentCat=cat; document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); showMenu(); }

function showMenu(){
  document.getElementById('menu-section').style.display='';
  document.getElementById('game-section').style.display='none';
  renderLevels(); updateProgress();
}

function renderLevels(){
  const list=document.getElementById('level-list');
  const unlocked=getUnlocked(currentLang);
  list.innerHTML='';
  LEVELS.forEach(lv=>{
    const isUnlocked=lv.n<=unlocked;
    const stars=getStars(currentLang,currentCat,lv.n);
    const best=getBestTime(currentLang,currentCat,lv.n);
    const btn=document.createElement('button');
    btn.className='level-btn '+(isUnlocked?'unlocked':'locked');
    btn.disabled=!isUnlocked;
    const starStr=stars?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'';
    const timeStr=best?'Best: '+best+'s':(isUnlocked?'Not played':'');
    btn.innerHTML='<span>'+(isUnlocked?'':'🔒 ')+lv.label+'</span><span class="level-meta">'+starStr+(starStr&&timeStr?'<br>':'')+timeStr+'</span>';
    if(isUnlocked) btn.onclick=()=>startGame(lv.n);
    list.appendChild(btn);
  });
  if(brotherUnlocked()){
    const bb=document.createElement('button');
    bb.className='brother-btn';
    bb.innerHTML='🧓 Enter The Brother';
    bb.onclick=()=>window.location.href='brother.html';
    list.appendChild(bb);
  }
}

function updateProgress(){
  const stars=getTotalStars();
  const pct=Math.min(100,Math.round((stars/BROTHER_UNLOCK_SCORE)*100));
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
}

function startGame(levelN){
  currentLevel=levelN;
  const lv=LEVELS[levelN-1];
  const pool=PHRASES[currentLang][currentCat];
  currentQuestions=shuffle([...pool]).slice(0,lv.count);

  const qc=document.getElementById('questions');
  qc.innerHTML='';
  currentQuestions.forEach((q,i)=>{
    const row=document.createElement('div');
    row.className='q-row';
    row.innerHTML='<div class="q-prompt">'+q.en+'</div><input type="text" id="q'+i+'" data-answer="'+q.tl+'" placeholder="'+langName(currentLang)+'..." autocomplete="off" autocorrect="off" spellcheck="false">';
    qc.appendChild(row);
  });

  document.getElementById('menu-section').style.display='none';
  document.getElementById('game-section').style.display='';
  document.getElementById('results-section').style.display='none';
  document.getElementById('results-section').innerHTML='';
  document.getElementById('submit-btn').style.display='';
  document.getElementById('timer').textContent='Time: 0s';

  document.querySelectorAll('#questions input').forEach((inp,i)=>{
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); const nx=document.getElementById('q'+(i+1)); nx?nx.focus():submitGame(); } });
    inp.addEventListener('input',resetIdleTimer);
  });
  setTimeout(()=>{ const el=document.getElementById('q0'); if(el) el.focus(); },100);

  startTime=Date.now();
  timerInterval=setInterval(()=>{ document.getElementById('timer').textContent='Time: '+Math.floor((Date.now()-startTime)/1000)+'s'; },500);
  resetIdleTimer();
}

function submitGame(){
  clearInterval(timerInterval);
  clearTimeout(idleTimer);
  hideGhost();
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  const lv=LEVELS[currentLevel-1];
  let correct=0, penalty=0;
  const wrong=[];

  currentQuestions.forEach((q,i)=>{
    const inp=document.getElementById('q'+i);
    const user=(inp.value||'').trim();
    const ok=normalise(user)===normalise(q.tl);
    if(ok){ correct++; inp.classList.add('correct'); }
    else{ penalty+=PENALTY; inp.classList.add('wrong'); wrong.push({prompt:q.en,correct:q.tl,user}); }
    inp.disabled=true;
  });

  const totalTime=elapsed+penalty;
  const total=currentQuestions.length;
  let stars=0;
  if(correct===total && totalTime<=lv.unlockTime) stars=3;
  else if(correct===total) stars=2;
  else if(correct>=Math.ceil(total*0.5)) stars=1;

  setStars(currentLang,currentCat,currentLevel,stars);
  setBestTime(currentLang,currentCat,currentLevel,totalTime);
  if(stars>=1 && currentLevel<LEVELS.length) setUnlocked(currentLang,currentLevel+1);

  document.getElementById('submit-btn').style.display='none';

  let html='';
  if(correct===total && penalty===0) html+='<div class="perfect-banner">🎉 PERFECT GAME! 🎉</div>';

  html+='<div class="result-header"><div class="score-big">'+correct+'/'+total+'</div>';
  html+='<div class="time-line">Time: '+elapsed+'s + Penalty: '+penalty+'s = <strong>'+totalTime+'s</strong></div>';
  html+='<div class="star-row">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div></div>';

  if(stars>=1 && currentLevel<LEVELS.length) html+='<div class="unlock-banner unlock-blue">🔓 Level '+(currentLevel+1)+' Unlocked!</div>';

  if(brotherUnlocked()) html+='<div class="unlock-banner unlock-green">🧓 The Brother is waiting! <button onclick="window.location.href=\'brother.html\'" style="margin-left:10px;background:white;color:#2d5a27;border:none;border-radius:8px;padding:5px 12px;font-weight:900;cursor:pointer;font-family:Nunito,sans-serif;">Enter →</button></div>';

  if(wrong.length){
    html+='<div style="color:rgba(255,255,255,0.35);font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;margin:12px 0 8px">Review these</div><div class="feedback-list">';
    wrong.forEach(w=>{ html+='<div class="feedback-item"><div class="fi-prompt">'+w.prompt+'</div><div class="fi-correct">✓ '+w.correct+'</div>'+(w.user?'<div class="fi-user">✗ '+w.user+'</div>':'')+'</div>'; });
    html+='</div>';
  }

  html+='<button class="btn-try" onclick="startGame('+currentLevel+')">Try Again ↺</button>';
  html+='<button class="btn-back" onclick="backToMenu()">← Back to Levels</button>';

  const res=document.getElementById('results-section');
  res.style.display=''; res.innerHTML=html;
  res.scrollIntoView({behavior:'smooth',block:'start'});
  updateProgress();
}

function backToMenu(){ clearInterval(timerInterval); clearTimeout(idleTimer); hideGhost(); showMenu(); }

function resetIdleTimer(){ hideGhost(); clearTimeout(idleTimer); idleTimer=setTimeout(showGhost,22000); }
function showGhost(){
  const g=document.getElementById('ghost'), m=document.getElementById('ghost-msg');
  const side=Math.floor(Math.random()*4);
  let top,left;
  if(side===0){top='8%';left=(10+Math.random()*60)+'%';}
  else if(side===1){top=(20+Math.random()*50)+'%';left='3%';}
  else if(side===2){top='80%';left=(10+Math.random()*60)+'%';}
  else{top=(20+Math.random()*50)+'%';left='78%';}
  g.style.top=top; g.style.left=left;
  m.style.top='calc('+top+' + 75px)'; m.style.left=left;
  m.textContent=GHOST_MSGS[Math.floor(Math.random()*GHOST_MSGS.length)];
  g.classList.add('visible'); m.classList.add('visible');
  ghostTimeout=setTimeout(hideGhost,5000);
}
function hideGhost(){ clearTimeout(ghostTimeout); document.getElementById('ghost').classList.remove('visible'); document.getElementById('ghost-msg').classList.remove('visible'); }

function normalise(s){ return String(s).toLowerCase().replace(/\.\.\./g,'').replace(/[éèêë]/g,'e').replace(/[àâä]/g,'a').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ûü]/g,'u').replace(/[ç]/g,'c').replace(/[ñ]/g,'n').replace(/[ß]/g,'ss').replace(/['"]/g,'').trim(); }
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }
function langName(l){ return{es:'Spanish',fr:'French',de:'German'}[l]; }

showMenu();
</script>
</body>
</html>
